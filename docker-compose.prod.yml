# Production docker-compose override.
# Usage:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  db:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  redis:
    restart: always

  backend:
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    ports: []  # Nginx will proxy

  daphne:
    command: daphne -b 0.0.0.0 -p 8002 config.asgi:application
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    ports: []

  celery:
    command: celery -A config worker -l warning --concurrency 4
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production

  celery-beat:
    command: celery -A config beat -l warning --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        CONFIGURATION: production
    command: ["nginx", "-g", "daemon off;"]
    restart: always
    ports: []

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - backend_static:/var/www/static:ro
      - backend_media:/var/www/media:ro
    depends_on:
      - backend
      - daphne
      - frontend
